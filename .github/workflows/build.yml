name: Multi-Platform Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  # Resolve Node 20 deprecation blocks
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build and Publish Electron App
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            npx electron-builder --win portable --publish always
          elif [ "$RUNNER_OS" == "macOS" ]; then
            npx electron-builder --mac dmg --publish always
          else
            npx electron-builder --linux AppImage --publish always
          fi

      - name: Upload Artifacts (Internal Backup)
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: dist/